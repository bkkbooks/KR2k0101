body:
  text: 欽定四庫全書金鰲退食筆記巻上詹事府詹事髙士竒撰嘗讀往史所載秦漢隋唐之宮闕髙者七八十丈廣者二三十里而離宫别館綿延聨絡彌山跨谷或至數百所何其奢侈宏麗可怖也明因金元之舊宫闕苑囿較秦漢隋唐僅十之三四然皇城之中即屬大内禁絶往來惟親信大臣得賜逰宴故或記或詩咸自詡為異數亦有終身官侍從未得一至者聞人説苑西亭臺宫殿無異海外三山縹緲恍惚疑信者半我國家龍興以來務崇簡樸紫禁城外盡給居人所存宫殿苑囿更不及明之三四凡在昔時嚴肅禁宻之地擔夫販客皆得徘徊瞻眺于其下有靈臺靈沼之遺意焉余自丁巳賜居太液池之西朝夕䇿馬過金鼇玉蝀橋望苑中景物七閱寒暑退食之頃偶訪曩時舊制約畧得之傳聞又彷彿尋其故址離宫别館廢者多矣脱復十數年老監巳盡遺蹟漸湮無以昭我皇上卑宫室約苑囿之儉德因率筆記之詳于西而畧于東如小南城葡萄園諸亭榭雖有存者總不及書以余所居在苑西也紀其興廢而復雜以時事欲見昭代之盛存為太平佳話也若彼内府衙署監局之載在㑹典與訪問未確其蹟莫攷者缺而不書景山則外人之所罕窺也亦不敢書今余所記皆都下臣庶旦暮經過俯仰習于見聞非同温室之樹莫可得而言者乃居者既以守近而不知過者又以匆遽而莫曉余生何幸移家其間炊煙燈火隣于紫極使不表而出之如身到海外三山茫無紀述寧無愧焉康熙甲子夏六月序太液池舊名西海子在西安裏門周凡數里上跨石梁約廣二尋修數百步兩崖穹甃出水中鯨獸楯欄皆白石鐫鏤如玉中流駕木貫鐵繂丹檻掣之可通巨舟東西峙華表東曰玉蝀西曰金鼇其北别駕一梁自承光殿達瓊華島制差小南北亦峙華表曰積翠曰堆雲瀛臺在其南五龍亭在其北蕉園紫光閣東西對峙層甍反宇飛簷拂雲夾岸榆栁古槐多數百年物池中萍荇蒲藻交青布緑野禽沙鳥翔泳水光山色間悠然自適盛夏芰荷覆水望如錦繡吐馥流香尤為清絶若其春氷乍泮秋月澄暉煙靄雲濤雨朝雪夜則余八年内直晨夕䇿馬過橋頭獨有㑹心者禁中人呼瀛臺南為南海蕉園為中海五龍亭為北海寒冬冰凍以木作平板下用二足裹以鐵條一人在前引繩可坐三四人行氷如飛名曰拖床積雪殘雲景更如畫又于冰上作擲毬之戲每隊數十人各有統領分伍而立以皮作毬擲于空中俟其将墮羣起而爭之以得者為勝或此隊之人將得則彼隊之人蹴之令逺喧笑馳逐以便捷勇敢為能本朝用以習武所著之履皆有鐵齒行冰上不滑也康熙癸丑六月九日賜閣部大臣詞林臺省逰西苑泛舟飲宴辛酉七月二十一日又賜閣部滿漢大臣詞林臺省部屬諸臣宴于西苑賜内紵蓮藕有差巳未二月晦日賜士竒與張敦復學士杜近公編修西苑逰宴是嵗五日侍宴西苑庚申七月十三日命余泛舟苑中中使鼓棹所得蓮芡盡賜之又嘗奉召自私寓騎馬入紫光閣門乘小舟至瀛臺内殿對畢復乘舟至紫光閣騎馬出賜荷花鮮魚攜歸甲子五日復于舟中侍宴皆有詩恭紀巳未二月晦日䝉恩賜宴西苑恭紀四首瓊圃丹垣裏璇臺緑水中山光開罨畫橋影控長虹徑轉金銜入波迴桂檝通太平多盛事浩蕩引春風淑景初晴後佳辰上巳前藻浮春水碧花帶曉霞鮮藉草沾香醑臨流對綺筵羽觴須盡醉天語更頻傳亭榭水雲隈軒楹面面開地疑仙島近人自玉墀來駕鳳雕甍出䟽龍磴道回賦成慚庾信忝竊侍臣才逺勝東堂㑹晉太和六年命羣臣于東堂臨流小㑹何殊曲水逰南宋顔延之有三日賜讌曲水賦詩序早鶯啼太液芳樹繞瀛洲厚眷真無極深恩逈莫酬此生懐帝澤端賴濟川舟巳未五日西苑泛舟侍宴恭紀四首新蒲細細滿瀛洲令節欣承聖主逰日出金支明兩岸波開畫艦泛中流嘉魚巳慣迎仙鷁好鳥偏能識翠虬香溢堯尊傾湛露恩深沆漭總難酬紅嶼青林閤道重凌晨霽景散千峰是日時雨初霽牙檣錦幔懸翔鳳宋孝武帝渡六合乘翔鳳舟水殿金鋪隠濯龍漢書帝在濯龍池仗外輕隂當檻靜筵前積翠入杯濃此身疑是來天上瑶島風光彷彿逢髙張廣樂播南薫寶幄樓船劍佩分玉澗鳴泉雲際落璚簫奏曲水中聞槐烟宻羃依巖障藻影連牽冩浪紋共喜昇平邀帝澤豈同漢武宴横汾仙艾靈絲傳五日蘭餚玉爼浥天漿荷浮小葉團青葢榴吐新花簇絳囊自有輕舠爭奪錦不須駿馬獻穿楊舊傳五日有過錦躤栁等宴微臣擬進江心鏡唐時五日于江心鑄鏡呈獻多恐名慚鵷鷺行庚申七月十三日賜逰西苑採蓮八首并序閬苑秋光得庾肩吾之句青潭曉靄賡徐彦伯之篇舒菡萏於方塘紅英度影翫芙蓉於曲榭碧葉浮香若斯撫景留連靡不尋聲唱答况乎迴翔舜海在沐日浴月之中泝泳堯淵極引水穿雲之樂檻棲花鷁非同鷗鷺閒汀橋落彩虹不是烟波小艇微涓莫補寵渥難名竊念臣跡本投竿心隨偃草似孤根之偶出品實遜乎亭亭擬短幹之方搖榮巳邀於灼灼時則涼飇既拂大火初流槎辭巧夕之雙星蓂紀中旬之三葉覩滄池之漭沆當秋宇之澄鮮上乃䕃芝葢以逍遙盪蘭舟而容與白蘋紫荇到處縈川翠羽紅鱗紛來入鏡尤喜緗荷之出水遍看珠菂之盈房特命移船容臣舉袖纔催進檝即分鳬雁之輝許帶歸鞍競拜櫻桃之賜擎盤散馥濺齒流甘緬維曩賢所談盛事陪逰灞滻亦號殊恩應制昆明羣矜絶響何似飛艎畫舸一如漁蓑釣笠之輕兼者仙液華腴不異菰米蓴絲之易真屬千秋之浩蕩未酬畢世之津涯爰紀八章敬疏短引江南靡艷之曲不敢凟奏乎宸聰渚北悃欵之言未足敷揚夫聖澤云爾芙蓉池水湛天淵萍末風輕破浪圓碧島丹崖方丈裏有誰來泛採蓮船曲渚蒹葭翠作圍新涼殘暑淡斜暉輕飜兩槳移舟入驚起莎邊白鷺飛風牕露檻接宸居水氣澄鮮浸太虚自是君恩深瀲灧特教天上看芙蕖鷁首風回撲面香青荷葉底摘金房剖來滿齒流瓊液不羡仙人掌上漿垂虹百尺壓鼇頭錦石疎花帶淺流遙見西峰開罨畫暮蟬聲裏變新秋綺岸銀塘倚棹過雞頭菱角漾清波臣今不作西湖憶煙水菰蘆興巳多水榭紅闌面面低玉題金埓隔東西緑隂交䕃松篁裏惟有水禽無數啼隠隠輕雷送雨濃迴看栁色映千重片雲忽斷月初出歸路時聞花外鐘甲子五日侍宴西苑恭紀四首炎景紆清晝嘉時奉御逰金蜺陳綵仗畫鷁動蘭舟髙栁隂初宻圓荷葉始抽遭逢近霄漢身巳到瀛洲浴蘭傳令節廣宴啟華池幙結千花蕋筵垂五色絲薫風散珠箔湛露捧瓊巵聖德昭恭儉無勞問水嬉島嶼三山外林塘五鳳西風藤牽紫蔓夏木發丹荑岸轉亭皆出波平檻盡低玉蝀坊裏望樓閣隠虹霓九重端扆暇逰豫濯龍泉蒲草沿堤碧榴花照佩鮮魚潜知聴樂鷗戲解迎船願以池為醴懽同在鎬傳招涼曲榭東鳳艦往來通仙管聞天上長筵布鏡中流鶯啼繞樹亂蝶舞依叢亭午宫槐影稀踈落綺櫳别命乘輕舫臨流飫大官三漿香泛螘六膳氣調蘭轉檝隨天仗追羣振羽翰微班陪絳灌渥澤等洪瀾瀛臺舊為南臺一曰趯臺陂林木深茂有殿曰昭和殿前有亭曰澄淵南有村舍水田于此閱稼明李文達賢賜逰西苑記云南臺林木隂森過橋而南有殿曰昭和門外有亭臨岸沙鷗水禽如在鏡中本朝順治年間别建宮室為避暑之處向南有亭臨水曰迎薫亭後樓九間樓後有殿制度質樸康熙庚申復加修葺皆易黄屋複殿重房交疏對霤青臺紫閣浮道相通又于水邊堆叠竒石種植花樹層巖小壑委曲曼迴蓼渚蘆灣參差掩映東有二亭以椶覆之隔牕雲霧捲幔山泉别具幽致又作宛轉橋出水面遙望流杯亭水聲樹色不異三山瑤島御製詩有畫舸分流簾下水秋花倒影鏡中山是也前作瀛臺門樓五間上日于侵晨臨門聴政畢外直講官于此進講髙槐拂檐堦下立塗金異獸二製作甚精左右迴廊各三間上亦有樓樓外復接小廊門内東西樓屋各五間自池東直房改作之後凡内廷進講皆遣中使至南書房召張敦復學士同余自西苑門内棹小舟至閘口復換小舟至臺西亭子從内左門入于東邊樓下講畢復從内左門出登舟中使送至西苑門上馬有時召士竒至内殿草制或月上乃歸則賜饌及池魚蓮藕之屬瀛臺門下迤北有過船亭雕簷峻宇下連丹檻掣之亦可行舟直北兩廂牕櫺臨水為内大臣及侍衛直宿之地再北為御膳房自膳房轉東為閘口各種船停泊堤外自閘口過小橋向東板橋一帶直抵池岸循池而北至西苑門古樹幽蟉槐栁茂宻葭菼蒼然白鷺黄鸝飛鳴上下部院諸臣曉入西苑門奏事從苑墻下轉西過小紅門别設板橋夾以朱欄懸設􅊻網許諸臣于奏對之暇舉網為歡有得魚者即攜以歸可謂昇平佳話也樂成殿入西苑門循水南行有牐㵼池水轉北别為小池中設九島三亭一亭藻井鬬角為十二面上貫金寶珠頂兩金龍盤柱作升降狀丹檻碧牖盡皆侈麗中設御榻四面皆梁檻通小朱扉而出名涵碧亭其二亭制少樸梁檻惟東西達涯際東有樂成殿左右檻各設龍床殿後小室亦設御榻明宣宗逰厯處也殿右有屋設石磨石碓二下激湍水自動南田榖成于此舂治故曰樂成後改殿為無逸亭曰豳風曰省耕每嵗秋成有打稻之戲駕幸無逸殿鐘鼓司扮農夫饁婦及田畯官吏徵租交納詞訟等事亦知稼穡艱難之意也明世宗時諭尚書李時等曰西苑工俱告完今日往視收穫以觀農事之終于是御豳風亭召見諸臣賜宴宴畢復御無逸殿東室曰西苑宮室是朕文祖所御近修葺告成欲于殿中設皇祖之位告祭之時等曰仁夀殿久巳廢圮一旦整飭行祭告禮益見聖孝嚴分宜嵩賜逰金海記云省耕亭上即隙地墾田督農耕之臨閱則坐此又有元夕侍宴豳風亭觀燈詩似曽于此張燈矣本朝亭殿乆不修治已未庚申嵗上避暑瀛臺余與張敦復學士寓直于無逸殿之東小室五楹茂樹迴環幽䕃蓊蔚池水下注泉聲淜湃曉烟初散荷香出水時歩豳風亭坐石砌上雨後蟬鳴風來花氣涼滿襟䄂以為身在蓬壺閬苑間曽賦西苑侍直詩十首次年改直廬為皇太子避暑宮即水碓陳列山石雜植新篁為清流激湍茂林修竹構亭于無逸殿舊址曰流杯亭風櫺水檻甍桷飛動細渠屈曲濺玉飛瓊上題曲澗浮花四字常宴外藩于此大學士益都馮公致政將歸賜逰西苑中使鼓棹至流杯亭備肴核内酒飲宴盡歡益都賦詩紀事都下榮之西苑侍直恭紀十首碧網丹甍閬苑中六龍駐輦翠微宫雲牕近處衣常潤水檻開時楫可通路接三山疑泛海臺髙百尺逈凌風周廬禁衛森嚴列隠隠仙璈下逺空林沼蔥蘢帶曉煙湖光一片漾清漣殘霞半映金堤栁靈雨先滋玉井蓮冉冉紅香迷野鶩絲絲緑影噪新蟬當軒止覺涼生袂早有薰風動睿篇輦道青莎軟作茵蒼蒼葭菼遍芳津蘋灣銷夏偏宜暑桂館招涼不受塵虹跨長橋排雁齒閣連飛宇次魚鱗自慚未是登瀛侶珥筆叨為侍從臣宸極髙居最上層千重雲樹碧烟凝竹埤花樹逢初霽藻砌梧枰散鬱蒸閣下横經看進艇亭西寓直許調冰醴泉炎景真堪避應勒新銘擬魏徵干羽懷柔到日南萬方無事樂桑蠶銀河鳬雁恩波闊玉澗莓苔化雨甘巖際共攀松粒五苑中齊識栁眠三樓船旍葆誇西漢不羨昆明碧水潭蓬壺窈窕隔塵凡曲渚斜開錦石嵓紅蓼晚涼清竹簟緑葵朝露濕絺衫㳺魚得水閒依荇畫鷁迎風自引帆正喜遭逢承御幄光天未敢荷長鑱朱垣曉啟晝方炎奏對諸僚禮數嚴錦障輕籠金勒馬黄羅髙捧緑頭籖篆浮寶獸香頻起漏滴銅龍水更添封事上林思曼倩詼諧忠愛有誰兼蕉園紺宇行難盡藥塢沙洲望總佳霧隠重檐横翠瓦泉從西郭入丹崖懸蘿巧結雙鴛帶細草爭抽小鳳釵薄暮林梢明月上頓教野性愜江淮西來爽氣逼新秋吹面荷風滿徑幽瀑布水聲喧户外黛螺山色落墻頭霑恩饌給銀絲膾宣勅人乗青翰舟遺蹟尚留觀稼殿君王樂處不㤀憂勤政樓前幾暇時古槐夾路影參差趨朝瑤浦呼船渡退食天閑賜馬騎出水蓮房初結子沉波菱葉細牽絲何須作記逰西苑日日螭頭一獻詩紫光閣由太液池西南隄循池而北舊有臺髙數丈中作圓頂小殿用黄瓦左右各四楹接棟稍下瓦皆碧南北垂接斜廊懸級而升面若城壁下臨射苑皆設門牖有馳道可走馬明武宗築以閱射者名曰平臺後廢臺改為紫光閣向北門外即金鼇坊明時五日幸西苑鬬龍舟于紫光閣前看御馬監勇士馳驟往來走解躤栁明愍帝召對閣臣於此大學士蒋公徳燝敬日草云召至紫光閣退出歩至林木間小憩旁有别館諸璫坐處有頃光禄寺送茶閣甚髙敞樹隂池影葱翠萬狀亦佳景也我朝仍名紫光閣向南隙地盡植桃杏仲春之際芳菲滿目上常於閣前殿試武進士騎射又于每嵗八月中秋前二三日集上三旗大臣侍衛較射更設帳殿次第而入御製詩所謂隊自花間入鑣從栁外分也髙等者賜蟒緞一疋内緞三疋潞紬二疋羊二隻次等者蠎緞一疋内緞二疋潞紬一疋羊一隻再次者内緞一疋潞紬一疋癸亥嵗改賜金牌銀牌有差上刻旌射二字皇太后避暑亦曽居此旁有百鳥房多蓄奇禽異獸如孔雀金錢雞五色鸚鵡白鶴文雉貂鼠舍貍猻海豹之𩔖不可枚舉本朝不此是尚但給飲啄而已芭蕉園自太液池東行半里許蒲葦盈水榆栁被岸松檜蒼翠果樹分羅中崇闥廣砌一殿穹窿以黄金雙龍作頂纓絡懸綴雕櫳綺牕朱楹玉檻望而敞豁舊曰崇智殿殿後藥䦨花圃有牡丹數十株轉西有亭八面内外皆水曰臨漪亭一曰釣魚臺金魚作陣逰戲其中又一小石梁出水中向西一亭在水際曰水雲榭按芭蕉園一名椒園有宮眷法從人等至此下馬二石碑當是世宗設醮時所立前朝實録告成於此焚草七夕宮中穿鵲橋補服設乞巧山子兵仗局進乞巧鍼十五日西苑作法事放河燈甜食房進供佛波羅蜜明世宗實録十五年五日端陽節幸西苑預命侯郭勛大學士李時尚書夏言候于崇智殿遣中官賫賜艾虎花縧百索牙扇等物御龍舟召勛等各登舟給酒饌命三臣舟近龍舟行自蕉園迤􅆔至澄碧亭登岸復宴於無逸殿盡歡而罷嚴分宜鈐山堂集載有詔賜金海乘涼詩序云供事西苑直宿無逸殿時溽暑蒸燠上命中官導五臣每以巳末申前於金海邊乘涼是日出迎和門乘舟泊水雲榭觀臨漪亭入蕉園至崇智殿畫棟雕甍金碧輝煥蒼松翠栢蓊鬱垂䕃不復知有暑氣又有金海放燈詩云紅燈焰焰水悠悠此夕真從天漢逰鸞簫鳳管鳴仙吹錦纜龍旗引御舟其二云恍驚華渚流虹照宛是緱山駕鳳來仙人指㸃瑤池上萬朶金蓮頃刻開又有西苑賜川扇詩云太液池邊暑氣生海榴英簇絳霞明蜀王新貢金花箑御苑傳呼賜禮卿本朝順治年間改為萬善殿供三世佛像選老成内監披剃為僧焚修香火木陳玉林兩老衲奉召至京師曽居萬善殿每嵗中元建盂蘭道場自十三日至十五日放河燈使小内監持荷葉燃燭其中青碧熠熠羅列兩岸以數千計又用琉璃作荷花燈數千盞隨波上下中流駕龍舟奏梵樂作禪誦自瀛臺南過金鼇玉蝀橋繞萬嵗山至五龍亭而回河漢微涼秋蟾正潔苑中勝事也玩芳亭在蕉園之西芳木匝之今廢承光殿在金鼇玉蝀橋之東圍以圓城設以睥睨自兩掖洞門而升中構金殿穹窿如葢華榱綺牖旋轉迴環俗曰圓殿外周以廊向北金鼇垂出垣堞間甚麗昔有古松三株枝幹槎枒形狀偃蹇如龍奮𤓰挐空突兀天表金元舊物也今止存其一明李文達賜逰西苑記云圓殿巍然髙聳曰承光北望山峰嶙峋崒嵂俯瞰池波蕩漾澄澈山水之間千姿萬態莫不呈竒獻秀於几牕之前韓右都御史雍賜逰西苑記云圓殿觀燈之所也殿臺臨池環以雲城厯階而登殿之基與睥睨平古松數株聳拔參天衆皆仰視時則晴雲翳空炎光不流暖風徐來花香襲人倚睥睨而窺其西以舟作浮橋横亘池面北則萬嵗山在焉殿廢于康熙七八年間云有蝙蝠大尺餘者南向二亭尚出雉堞上門閉塞久不啟余朝夕騎馬過其下輒愛古栝之夭矯蒼翠而於雪朝月夜更徘徊不忍去云承光殿古栝行用東坡司竹監燒葦園韵承光古栝雙枒槎蒼皮聳􅆬叅雲霞經冬顔色鬱深翠入春發葉如蔣芽白頭老監説舊事西苑圓殿頻矜誇花香露氣接大内徑路窈窕疑仙家雕闌四圍粉堞壓綺牕十面珠簾遮當時嚴肅是禁地那許橋上馳麴車金元舊物厯代重頽枝半折輕杉义侵霜溜雨積嵗月漏鼓聽遍朝元撾西偏盤曲勢舞鳳東頭突兀形驚蛇我行低徊䇿欵段仰面斗絶聲呀呀洞門久閉長狐兔安得啟戸爭投􅆯七年千回看未厭慣聞下直栖宮鴉使其託根在深谷但侶澤雉與山麚肩挑背負不知愛歇涼墻脚時語譁常思解襟復科跣鼾睡宻䕃逰羲媧含章之梅靈和栁止増妖冶豈此加團城似甕瓊構廢或者留意除紛奢趨朝日日樂水木往蹟漫比槐排衙秋宵月皎寒晨雪每過更覺流連佳興酣攬轡忽欲墮踈雨巳霽河漢斜瓊華島在太液池中從承光殿北度石梁至島皆以文磚乳花石雜甃之巖洞窈窕磴道紆折多疊竒石㠝岏岞崿其巔古殿相傳本遼太后梳粧臺厯金元明皆有宮殿為逰觀之地今殘石壞礎猶刻雲物及廣寒殿宇遼史云皇城西門曰顯西設而不開北曰子北其西城巔有涼殿金史宮闕制度云京城北離宫有大寧宫大定十九年建後更為寧夀又更為夀安明昌二年更為萬寧宫瓊林苑有横翠殿寧德宮西園有瑤光臺又有瓊華島瑤光樓元郝文忠公經陵川集載有瓊華島賦葛邏禄迺賢金臺集有粧臺詩云廢苑鸎花盡荒臺燕麥生韶華如逝水粉黛憶傾城野菊金鈿小秋潭玉鏡清誰憐舊時月㑹向日邊明其下自註云粧臺在昭明觀後金章宗嘗與李妃夜坐上曰二人土上坐妃應聲曰一月日邊明上大悦又有夀安殿詩云夢斷朝元閣來尋買酒樓野花迷輦路落葉滿宮溝風雨青城暮河山紫塞愁老人頭雪白扶杖話幽州陶九成輟耕録載元時宮闕云萬夀山在大内西北太液池之陽金人名瓊花島中統三年修繕之至元八年賜今名其山皆叠玲瓏石為之峰巒隠映松檜隆鬱秀若天成引金水河至其後轉機運㪺汲水至山頂出石龍口注方池伏流至仁智殿後有石刻蟠龍昻首噴水仰出然後由東西流入於太液池山前有白玉石橋長二百餘尺直抵儀天殿後橋之北有玲瓏石擁木門五門皆為石色内有隙地對立日月石西有石棋枰又有石坐牀左右皆有登山之徑縈紆萬石中洞府出入宛轉相迷至一殿一亭各擅一景之妙山之東有石橋長七十六尺闊四十一尺半為石渠以載金水而流於山後以汲於山頂也又東為靈圃竒獸珍禽在焉即今之景山是也廣寒殿在山頂七間東西一百二十尺深六十三尺髙五十尺重阿藻井文石甃地四面瑣牕板宻其裏徧綴金紅雲而蟠龍矯蹇於丹楹之上中有小玉殿内設金嵌玉龍御榻左右列從臣坐牀前架黒玉酒甕一玉有白章随其形刻為魚獸出沒於波濤之狀其大可貯酒三十餘石今在西華門外真武廟中道人作菜甕又有玉假山一峰玉響鐵一懸殿之後有小石笋二内出石龍首以噀所引金水西北有厠堂一間仁智殿在山之半三間髙三十尺金露亭在廣寒殿東其制圓九柱髙二十四尺尖頂上置琉璃珠亭後有銅幡竿玉虹亭在廣寒殿西制度同金露方壺亭在荷葉殿後髙三十尺重屋八面重屋無梯自金露亭前複道登焉又曰線珠亭瀛洲亭在温石浴室後制度同方壺玉虹亭前仍有登重屋複道亦曰線珠亭荷葉殿在方壺前仁智殿西北三間髙三十尺方頂中置琉璃珠温石浴室在瀛洲前仁智西北三間髙二十三尺方頂中置塗金寶瓶圜亭又曰臙粉亭在荷葉殿稍西葢后妃添妝之所也八面介福殿在仁智殿東差北三間東西四十一尺髙二十五尺延和殿在仁智殿西北制度如介福馬湩室在介福殿前三間牧人之室在延和殿前三間庖室在焉湩前東浴室更衣殿在山東平地三間兩夾太液池在大内西周迴若干里植芙蓉儀天殿在池中圓坻上當萬夀山十一楹髙三十五尺圍七十尺重簷圓葢頂圓臺址甃以文石藉以花茵中設御榻周闢瑣牕東西門各一間西北厠堂一間臺西向列甃塼龕以居宿衛之士東為木橋長一百二十尺闊二十二尺通大内之夾垣西為木弔橋長四百七十尺闊如東橋中闕之立柱架梁於二舟以當其空至車駕行幸上都留守官則移舟斷橋以禁往來是橋通興聖宫前之夾垣後有白玉石橋乃萬夀山之道也犀山臺在儀天殿前水中上植木芍藥隆福宫西御苑在隆福宫西先后妃多居焉香殿在石假山上三間兩夾二間柱廊三間龜頭屋三間丹楹瑣牕間金藻繪玉石礎琉璃瓦殿後有石臺山後闢紅門門外有侍女之室二所皆南向並列又後直紅門並立紅門三三門之外有太子鄂爾多荷葉殿二在香殿左右各三間圓殿在山前圓頂上置塗金寶珠重簷後有流杯池池東西流水圓亭二圓殿有廡以連之歇山殿在圓殿前五間柱廊二各三間東西亭二在歇山後左右十字脊東西水心亭在歇山殿池中直東西亭之南九柱重簷亭之後各有侍女房三所所為三間東房西向西房東向前闢紅門三門内立石以屏内外外築四垣以周之池引金水注焉椶毛殿在假山東偏三間後盝頂殿三間前啟紅門立垣以區分之儀鸞局在三紅門外西南隅正屋三間東西屋三間前開一門明宣宗實録宣德三年春奉皇太后逰西苑宣宗親掖皇太后升萬嵗山奉觴上夀獻詩頌聖德皇太后悦酌酒賜宣宗且諭曰今天下無事吾母子得同此樂皆天與祖宗之賜也天下百姓皆天與祖宗之赤子為人君者但能保安百姓使不至於飢寒則吾母子斯樂可久逺矣宣德七年七月宣宗復登萬嵗山作廣寒殿召翰林院儒臣侍命周覽都畿山川形勢既畢上諭之曰此元之故都也世祖知人善任使信任儒術愛養民力故能渾一區宇以成帝業再傳至武宗元政稍有變更仁宗繼之恭儉愛人即位之初興學校勵風憲清中書其孜孜為治一遵世祖之定法足為賢君至順帝在位既久肆意荒淫怠于政事紀綱法度蕩然因之失國使順帝能恭儉長守世祖仁宗之法天下豈為我祖宗所有又曰兹山兹宇順帝所日宴逰者也豈不可感侍臣叩首曰紂之跡周之監也八年四月諭少傳楊士竒楊榮曰朕在宮中無事偶有眞趣則賦一詩自適不然則取書籍玩味故所在置書籍及楮筆之𩔖今修葺廣寒清暑二殿及西瓊島欲於各處皆置書籍卿二人可于館閣中擇能書者數十人取五經四書及説苑之𩔖每書各録數本分貯其中以備覽閲又朕近作廣寒殿記遂命中官取示竒等楊文貞賜逰西苑記云登萬嵗山至廣寒殿而仁智介福延和三殿及瀛洲方壺玉虹金露之亭咸得遍造是日天宇澄明纎塵不作引而四望山川之壯麗草木之芳華飛走潛躍各随其性萬象畢陳胸次豁然心曠神怡百慮皆淨信天造之佳境而人生之甚適也李文達賜逰西苑記云西有長橋跨池下過石橋而北山曰萬嵗怪石參差為門三自東西而入有殿倚山左右立石為峰以次對峙四圍皆石贔屭齦齶蘚封蔓絡佳木異草上偃旁綴樛葛薈翳兩掖叠石為磴﨑嶇折轉而上巖洞非一山畔並列三殿中曰仁智左曰介福右曰延和至其頂有殿當中棟宇宏偉簷楹翬飛髙挿于層霄之上殿内清虚寒氣逼人雖盛夏亭午暑氣不到殊覺曠蕩瀟爽與人境異曰廣寒左右四亭在各峰之頂曰方壺瀛洲玉虹金露其中可跂而息前崖有壁夾道而入壁間四孔以縱觀覽而宮闕崢嶸風景佳麗宛如圖畫韓右都御史賜逰西苑記云萬嵗山在池之中磊石為之髙數千仭廣可容萬人山之麓以石為門為垣門之内稍髙有小殿環殿奇峰怪石萬狀悉有名卉嘉木爭妍競秀琴臺棋局石床翠屏之𩔖分布森列峰有最奇者名翠雲上刻御製詩琴臺上横郭公磚擊之皆鏗鏗有聲遂沿西坡北上有虎洞呂公洞仙人菴又上有延和殿瀛洲亭金露亭瀛洲之西湯池之後有萬丈井深不可測由金露折而東上則廣寒殿也髙廣明靚四壁雕彩雲累萬結砌而成東下至玉虹又下而南至方壺至介福皆與延和諸殿相對峙而方壺瀛洲則左右廣寒而奇特者也嚴分宜賜逰廣寒殿詩序云泛金海觀于廣寒山蕩舟持節者皆中使水光蕩漾逺近亭臺隠現金碧交輝若身造瑤池弱水之間舍舟登岸陟廣寒之殿絶頂巍峙髙入雲漢山麓為臺為殿山下有堆雪積翠之坊余厯觀前人記載兹山實遼金元逰宴之地明時殿亭皆因元之舊名其所叠石巉巖森聳金元故物也或云本宋艮岳之石金人載此石自汴至燕每石一准糧若干俗呼為折糧石又瑤島春雲為燕京八景之一李崆峒秋懷詩云苑西遼后洗粧樓檻外方湖靜不流又曰雕闌玉樹留天女錦石秋花隠御舟葢指此也明時重九幸此登髙萬厯七年廣寒殿傾頽其脊中多至元錢神宗曽分賜輔臣張江陵居正明大學士蔣公德璟敬日草與内監劉若愚勺中志乃以今之景山為萬嵗山人多因之誤矣本朝順治八年毁山之亭殿立塔建寺樹碑山趾康熙已未地震白塔頽壊次年重建加莊嚴焉每嵗十月二十五日自山下燃燈至塔頂燈光羅列恍如星斗諸喇嘛執經梵唄吹大法螺餘者左持有柄圓鼓右執彎槌齊擊之緩急踈密各有節奏更餘方休以祈福也辛酉冬運是山之石于瀛臺白塔之下僅餘黄壤宜多植松栢為菁葱鬱茂之觀順治八年白塔寺碑恭惟皇上仁孝性成天縱太平之主也親政以來拳拳以愛飬斯民為念是以雨暘時若嵗稱大有天心眷顧此其明徵有西域喇嘛者欲以佛教隂賛皇猷請立塔建寺夀國佑民奉㫖果有益於國家生民朕何靳數萬金錢為故賜號為惱木汗許建塔於西苑之髙阜處庀材鳩工不日告成因命臣等而為之記内翰林院𢎞文院掌院事大學士希福譯滿洲䝉古文内翰林國史院大學士甯完我撰漢文塔七哈哈畨羅米書冩滿洲字搜史書冩䝉古字典籍楊振麟書冩漢字嵗次辛夘孟秋吉旦立臺城路苑西梳粧樓懷古雕闌幾曲層臺上舊是廣寒宮宇綺綴迎風珠錢漏月想見玉虹金露穠華無據但錦石生苔秋花㸃土艷粉香脂珮環聲作踈踈雨堆雲橋外徙倚尚澄湖一片晚霞孤鶩雁柱調絃鸞牋冩怨何限當年情緒長安砧杵共蟋蟀悲吟惹人詞賦繫馬垂楊依稀聴梵語金鼇退食筆記巻上
