body:
  text: 金鰲退食筆記巻下詹事府詹事髙士竒撰大髙元殿在神武門之北南向臨玉河其前門曰始青道境左右有牌坊二曰先天明鏡曰太極仙林曰孔綏皇祚曰宏佑天民内有二閣左曰炅音陽明閣右曰􅾃音隂靈軒殿之東北曰象一宮所供象一帝君範金為之髙尺許明世宗元修玉容也門前二亭鈎簷鬬桷極盡人巧中官呼為九梁十八柱云官民過者至此下馬每嵗大旱則建醮祈雨遣官禮拜殿之東即北上西門有橋甃磚石各半謂防車輪耳乾明門遺址在大髙元殿之西承光殿之東尚有石基巍然人無知者元都勝境在宏仁寺之西建于元相傳為劉元塑像正殿乃玉皇大帝右殿塑三清像儀容肅穆道氣深沉左殿塑三元帝君像上元執簿側首而問若有所疑一吏跪而答甚戰慄一堂之中皆若悚聴嚴肅者神情動止恍如聞其謦欬真稱絶藝禮旃檀佛者無不便道看劉蘭塑云葢悞元為蘭也元史工藝傳阿納噶尼波羅國人也幼敏悟異凡兒同學有為繪畫妝塑業者讀尺寸經阿納噶一聞即能記至元十年授大匠總管有劉元者嘗從阿納噶學西天梵相亦稱絶藝元字秉元薊之寶坻人始為黄冠師事青州把道録傳其藝非一至元中凡兩都名刹塑土範金摶換為佛像出元手者神思妙合天下稱之其上都三皇尤古粹識者以為造意得三聖人之微者由是命以官長其屬行幸必從仁宗嘗勅元非有㫖不許為人造他神像後大都南城作東嶽廟元為造仁聖帝像巍巍然有帝王之度其侍臣像乃若憂深思逺者始元欲作侍臣像久之未措手適閲秘府圖畫見魏徵像矍然曰得之矣非若此莫稱為相臣者遽走廟中為之即日成士大夫觀者咸嘆異焉其所為西畨佛像多秘人罕得見者元官為昭文館大學士正奉大夫秘書監卿以夀終輟耕録亦載其事藏舟浦自瓊華島東麓過石橋由陟山門折而北循岸數百步有水殿二深十六間一藏龍舟一藏鳳舸舟首尾刻龍鳳形上結樓臺以金塗之備極華麗又一浦繫五六小舟岸際有叢竹䕃屋浦外一亭今皆荒廢秋來露冷野鶩殘荷隠約蘆汀蓼岸不減趙大年一幅江南小景也雪池在陟山門迤北凡宮中雪後掃出殘雪堆積于此今多積之景山矣五龍亭舊為太素殿創于明天順年在太液池西南向後有草亭畫松竹梅于上曰嵗寒門左有軒曰臨水曰逺趣軒前有草亭曰㑹景今改建五亭中曰龍澤左曰澄祥滋香右曰湧瑞浮翠總名之為五龍亭珠簾畫棟照耀漣漪從玉蝀行者遙望水次丹碧煇映疑是仙山樓閣後有石坊曰福渚北曰夀岳中有錫殿以錫為之不施磚甓每嵗盛夏太皇太后避暑于此皇上聴政之後輒駕小舟問安或侍膳亭上四面荷香微涼清暑癸亥元夜于亭前施放煙火聽京師人民觀看時余巳退直矣命侍衛那爾泰海清至余私寓召至亭前賜飲饌坐觀星毬萬道火樹千重金輪寶燄光輝奪目天家富貴盛世歡逰願萬方同之也向于稍南有屋數連通池水以育禽鳥舊名天鵝房有亭曰映輝又有飛靄澄碧二亭遺址今惟音引祥橋牓獨存凝和殿在池東西向二亭臨水曰湧翠曰飛香白頭老監尚能言之迎翠殿在池西東向臨水有亭曰澄波明嘉靖時更建浮香寶月二亭東望萬嵗山倒蘸于太液波光之中黛色嵐光可掬可挹今惟短垣而己西海神祠在北閘口明嘉靖十四年諭禮部尚書夏言曰西海子嵗以午日奉兩宮逰宴止行望祀宜特建祠宇于湧玉亭以答神貺又曽命勲輔大臣禱雨于此按禁城内西海子古燕京積水潭也源出西山神山一畆馬眼諸泉繞出甕山後滙為七里濼入都城由北安門外藥王廟西橋下入皇城自北閘口延竟大内出大通河轉漕亦賴其利元史海子在皇城之北萬夀山之隂舊名積水潭聚西北諸泉之水流入都城而滙于此汪洋如海都人因名焉恣民漁採無禁又元史河渠志通惠河其源出于白浮甕山諸泉水也世祖至元二十八年都水監郭守敬奉詔興舉水利因建言疏鑿通州至都河改引渾水溉田于舊牐河蹤跡𨗳清水上自昌平縣白浮村引神山泉西折南轉過雙塔榆河一畆玉泉諸水至西門入都城南滙為積水潭東南出文明門東至通州髙麗莊入白河又曰金水河其源出于宛平縣玉泉山至大四年七月引金水河水注之光天殿西花園石上前舊池置牐四以節水又曰海子岸上接龍王堂以石甃其四周海子一名積水潭聚西北諸泉之水流行入都城而滙于此元仁宗延祐六年都水監㑹計前後與元修舊石岸相接凡用石三百有五各長四尺闊二尺五寸厚一尺石灰三千斤該三百五工丁夫五十石工十元許有壬詩云御溝流水曉潺潺直似長虹曲似灣流入宮墻才一尺便分天上與人間歐陽𤣥詩云鼇山宴罷月溶溶太液池邊湛露濃不用金蓮送歸院水晶宮出玉芙蓉皆西海子作也葛邏禄廼賢西華潭詩云秋水清無底涼風起緑波錦帆非昨夢玉樹憶清歌帝子吹笙絶漁郎把釣多磯頭浣沙女猶恐是宮娥下自註云金之太液池也乾佑閣建自明萬厯年間在太液池之北髙八丈一尺廣十七丈磴道二分三合而上倒影入水波光蕩漾如水晶宮闕天啟時毁之即其處為嘉樂殿其門曰延景門今亦廢再西則親軍内教場也大西天經厰在五龍亭東北山門臨太液池南向第二層殿曰大慈真如寶殿殿壁繪畫龍神海怪又有三大軸髙丈餘廣如之中繪衆聖像二十餘左右則文殊普賢變相三首六臂每首三目二臂合掌餘四臂擎蓮花火輪劍杵簡槊并日月輪火燄之屬裸身著虎皮裙蛇纒胸項間努目直視威靈凛烈金塗錯雜形彩陸離傳為商喜筆也殿中立一小臺可丈餘臺上有亭如毘盧頂亭中黄繖下則西天説法像也真如面南周環而諦聴者列如團箕像皆尺許範銅為之冠簮袍笏儀表肅然中垂五六線下繫一物似機牀又如車軸若轉輪狀東西列四從神各四尺眉結雲聚目稜電擊猛燄慧肩快蜂搶軒戴銀兜鍪衣烏鎧佩弓矢儀容嚴毅如生葢傀儡胎也據内典下天處蘇迷盧之半為忉利尉侯北方毗沙門統藥义衆所治水精宮城䕶世其住處曰紛陀利曰質多羅曰七林曰摩倫曰如意等下壓象跡當歡喜之地上接蜂歌離莊嚴之境常憍尸迦將破怨敵聖者奮勇健臂出甲胄林獨揭勝幢不頓一㦸􅚢迦婁而垂翅捘修羅而束手猶怒折蓮柄狂搜藕絲由此觀之雖在空門亦以忿怒鏖撲為法大防不獨世間攘巨冦者袵金浴鐵强矯雄毅也三層設大士像門前古槐數株婆娑清䕃東有石屏髙八九尺上刻龍水鱗甲飛動在斜陽蔓草間亦銅駝石馬之𩔖歟左臨海亭右臨海亭在西苑門外今廢聚景亭在太液池之東今廢宏仁寺在太液池西南岸地最爽朗本朝康熙年間即清馥殿基址改建為寺迎旃檀佛居之黄甓碧甃齋館敞麗前樹二坊東曰廣㤙敷化西曰普度能仁入寺數武白石甃方池上跨三梁緑荷出水朱魚吹藻其西作龍首自墻外汲太液水貫注之池北天王殿殿東西分峙兩樓以懸鐘鼓再進為慈仁寶殿左曰弼教右曰翊化又進為大寶殿左曰覺德右曰普慧僧房之前松栢楸槐䕃植庭牖所謂兜率淨宮須彌寶殿莫尚于斯也旃檀佛像髙五尺鵠立上視後瞻若仰前瞻若俯衣紋水波骨法見其表左手舒而直右手舒而垂肘掌皆微弓指微張而膚合三十二相中鵝王掌也勇猛慈悲精進自在以意求之皆備相傳為㫋檀香木叩之聲鏗鍧若金石入水不濡輕如髹漆晨昏寒暑其色不一大抵近于沉碧萬厯中慈聖太后始傅以金元翰林學士程鉅夫瑞像殿碑云釋迦如來初為太子生七日摩耶棄世生忉利天佛既成道思念母恩遂昇忉利天為母説法優填國王自以久失瞻仰于如來欲見無從乃刻旃檀為像目犍連尊者慮有闕繆躬以神力攝三十二匠昇忉利天諦觀相好三返乃得其真既成國王臣民奉猶真佛焉及佛返人間王率臣庶自往迎佛此像騰步空中向佛稽首佛為摩頂授記曰我滅度千年之後汝從震旦廣利人天由是飛厯西土一千二百八十五年龜兹六十八年涼州十四年長安一十七年江左一百七十三年淮安三百六十七年復至江南二十一年汴梁一百七十七年北至燕京居聖安寺十二年北至上京大儲慶寺二十年南還燕京内殿五十四年燕宮火迎還聖安寺一十九年元世祖迎入萬夀山仁智殿十五年遷于萬安寺一百四十餘年明蜀僧紹乾續記云自萬安寺復居慶夀寺一百二十餘年嘉靖戊戌慶夀寺灾奉迎鷲峰寺迄天啟丁夘共居八十八年計優填造像當周穆王辛夘至明熹宗丁夘凡一千六百一十餘年由今計之自丁夘至康熙甲子又五十七年佛以靈異著聞京師㝢内王公大人士庶婦女捐金莊嚴以丐福利者嵗無虚日寺以西域僧主之食二品俸更于殿後造白塔一座設鎏金頂神光壯麗工制甚精每嵗正月車轂如雲綺羅從風聽民間士女觀看瞻禮也然攷釋氏感通録云梁武帝遣郝騫等往天竺國迎佛旃檀像其王摹刻一像付騫天監十年至建康帝迎奉太極殿建齋度僧大赦斷殺自是蔬食絶慾據此説又與程鉅夫碑文不同則此像為優填之所刻歟抑天竺之所摹歟内有御製碑刻二通謹録於左又一碑刻成都釋紹乾旃檀瑞像來儀記明萬厯丁酉八月立葢自鷲峰寺遷于此者其辭與程鉅夫記畧同不具載御製宏文寺碑文朕惟佛教之興其來巳久使人遷善去惡隂翊德化不可忽也兹旃檀像自佛初成道刻表以來屢著靈異尤當景崇今特擇景山西之善地創建殿宇於康熙四年十月二十七日自鷲峰寺遷移供奉配以菩薩從神為宗社永呵䕶生民祈福祐威儀不逺資瞻禮焉是用勅名宏仁勒諸貞珉以誌不朽云康熙五年四月二十九日立御製旃檀佛西來厯代傳祀記朕聞佛教遷善去惡有裨治世化民故厯代尊崇流傳靈異厥蹟甚著誠以出世入世似屬分途而化俗淑民初無二理粤稽記録佛以周昭王二十四年甲寅誕生西域穆王五十二年壬申入滅佛成道後嘗升忉利天為母氏説法數月未還時優填王以久闊瞻依廼刻旃檀像佛聖表以竚翹想之懷目犍連慮有缺謬以神力攝三十二匠升天諦觀相好三返乃得其真既成王及國人若與神對及佛復降人間王率臣庶往迎佛其像升空謁佛佛為摩頂授記曰我滅度千年後爾往震旦國大興佛化佛滅千二百八十餘年始自西域傳至龜兹六十八年至涼州一十四年至長安一十七年至江左百七十三年至淮南三百一十七年復至江南二十一年北至汴京百七十七年金太宗於辛亥嵗迎至燕京建水陸㑹安奉於憫忠寺十二年是年金熙宗於上京建大儲慶寺成奉迎於積慶閤中二十年金國海陵王復南迎還燕宮内殿居五十四年元朝丁丑嵗三月㑹内殿火尚書舒穆嚕公迎往聖安寺一十九年至元世祖至元十二年乙亥遣大臣博囉等備法駕音伎奉迎入萬夀山仁智殿居十五年丁丑建大聖萬安寺二十六年巳丑自仁智殿奉迎於寺之後殿百四十餘年自爾迎於慶夀寺至嘉靖十七年居百二十餘年因寺回禄奉迎於鷲峰寺至康熙四年乙巳居一百二十七年計自優填王造像之嵗當穆王十二年辛夘至我朝康熙五年丙午凡二千六百五十餘年矣甚哉巍巍瑞像金姿玉容光明相好瞻仰供奉如與神對朕覽厯代之往蹟昭新創之宏模廼考來儀舊記所載自西域傳至中國上下共二千六百五十餘年之久勒諸貞珉以紀盛事垂之永久用誌不朽云康熙五年四月二十九日立清馥殿度金鼇玉蝀橋西轉北明世宗所建常奉興獻太后來逰前有翠芳錦芬二亭荷花盛開紅衣翠葢澄漪倒水恍如蓬壺嚴分宜賜逰清馥殿詩帝苑雲霞麗仙宫洞壑幽春生翡翠殿花滿鳳凰樓瑤草迎宸蹕瓊波侍御舟共傳今聖孝當日奉慈逰又云十里宜春苑金堤覆緑楊水涵瑤殿碧花簇錦亭芳馳道通長樂離宫接建章微臣一何幸留賞沐恩光厯觀嚴分宜賜逰諸詩可謂千載之遇乃不能潔巳輔弼怙寵專權遂使君臣之義不終良可嘆也改建宏仁寺者即此騰禧殿在旃檀寺之西覆以黑琉璃瓦明武宗西幸宣府悦晉王樂伎劉良女姿容婉麗善謳遂載以歸居騰禧殿飲食起居必與之偕南征亦隨行在武宗每縱獵輒以劉姫諌而止兼有馳馬失簪一事實録備載之俗呼為黑老婆殿傍有古井曰王媽媽井今惟遺址騰禧宫廢址苑頭苔蘚沒輦路階級井闌餘舊基緑牕朱户早荒廢猶説武皇西幸時輕装小隊趨雁塞土牛綵仗陳春嬉烟花少妓妙歌舞銀筝羌管聲叅差夜闌神女入幽夢氷簟膩滑涼沁肌芙蕖出水比顔色楚王半醉心迷離酒樓繫馬大道側教坊懸牓黄金題兩槐囷輪茂枝葉宣府有武宗行宮手植雙槐樹並駐驆酒樓遺址尚存至今樂府傳新詞小苑别勅架宮殿委曲戸牖盤蛟螭玉釵殷勤有宻約馬馳既失無人知五轉三回召始發登車還蹙雙蛾眉殿中一入誰復見殿外池水生漣漪寶髻羅裙艷金屋落梅纎草驚春遲豹房月冷愴寒露斷礎似為紅顔悲腐儒無乃愛聲色屢尋遺跡將何為雨中貯泉滌古研破簾不巻風颸颸櫺星門在金鼇玉蝀橋西迤北有巷曰羊房夾道舊有内安樂堂凡宮人有病及年老或有罪先發此處待年久再發外之浣衣局明憲宗時萬貴妃專寵孝穆紀皇后有孕曽託病誕生孝宗于此果園厰在櫺星門之西明永樂年製漆器以金銀錫木為胎有剔紅填漆二種所製盤合文具不一剔紅合有蔗段蒸餅河西三撞兩撞等式蔗段人物為上蒸餅花草為次盤有圓方八角縧環四角牡丹瓣等式匣有長方二撞三撞四式其法朱漆三十六次鏤以細錦底漆黑光鍼刻大明永樂年製比元時張成楊茂劍環香草之式似為過之宣宗時厰器終不逮前工屢被罪因私購内藏盤合磨去永樂鍼書細款刀刻宣德大字濃金填掩之故宣欵皆永器也填漆欵亦如之填漆刻成花鳥彩填稠漆磨平如畫久而愈新其合製貴小深者五色靈芝邊淺者回文戧金邊古色蒼瑩器傳絶少故價數倍于剔紅二種皆稱厰製世甚珍重之而不可多得厰之遺址今為内務府人役所居玉熙宮在西安裏門街北金鼇玉蝀橋之西明世宗嘉靖四十年十一月辛亥萬夀宮災蹔御玉熙宮神宗時選近侍三百餘名于玉熙宮學習官戲嵗時陞座則承應之各有院本如盛世新聲雍熙樂府詞林摘艷等詞又有玉娥兒詞京師人尚能歌之名御製四景玉娥郎嚴分宜聴歌玉蛾兒詞詩云玉蛾不是世間詞龍艦春湖捧御巵閭巷教坊齊學得一聲聲出鳳凰池注云上命閣臣應制作也他如過錦之戲約有百回每回十餘人不拘濃淡相間雅俗並陳又如雜劇古事之類各有引旗一對鼓吹送上所扮備極世間騙局俗態并拙婦騃男及市井商賈刁賴詞訟雜耍諸項葢欲深宮九重之中廣識見博聰明順天時恤民隠也水嬉之製用輕木雕成海外諸國及先賢文武男女之像約髙二尺彩畫如生有臋無足而底平下安夘栒用竹板承之設方木池貯水令滿取魚蝦萍藻實其中隔以紗障運機之人皆在障内㳺移轉動一人鳴金宣白題目代為問答惟暑天白晝作之以銷長夏明愍帝每宴玉熙宮作過錦水嬉之戲一日宴次報至汴梁失守親藩被害遂大慟而罷自是不復幸玉熙宮矣吳偉業琵琶行有云先皇駕幸玉熙宮鳳紙僉名喚樂工苑内水嬉金傀儡殿頭過錦玉玲瓏一自中原盛豺虎煖閣才人罷歌舞挿栁停搊素手筝燒燈罷擊花奴鼓葢指此也迨入我朝遂廢不治康熙十三年五月于此設席殿奉安仁孝皇后梓宮集百官舉哀今改為内廐豢養御馬門前存一古樹槎枒臃腫生意盡矣大藏經厰在玉熙宮遺址之西即司禮監經厰也貯經書典籍及釋藏諸經今仍舊制萬夀宮在西安門内迤南大光明殿之東明成祖潛邸也殿東西有永春萬春諸宮翼而前為門者三或曰即舊仁夀宮明世宗晚年愛靜常居西内勲輔大臣直宿無逸殿日有賜賚如玲瓏雕刻玉帶金織蟒服金嵌寶石斗牛縧環綵絨䕶膝獨角獸補子貂䑕煖耳綵装松竹梅鸞帶花線縧青油雨笠金鑲伽楠香帶刻花合香牌子葫蘆景畫銀豆銀人吉祥珊瑚定勝銀牌子刻平安二字銀像生人馬銀孩兒金夀仙方袋銀瓢刀筯三事御藥如意湯騫林茶笋尖梅蘇九袖香面衣御製藥酒五味湯内酒竹葉青真珠紅長春酒酒蟹橄欖橙橘瓜果之𩔖嚴分宜記賜畫扇有海榴罌可寸許穴其腹藏象刻物器一百事工巧異甚又有水晶及牙仙人墜子今朱垣隙地雜居内府人役間藝黍稷及堆官柴草南曰草厰北曰柴闌云大光明殿在西安門内萬夀宮遺址之西地極敞豁門曰登豐前為圓殿髙數十尺制如圜丘題曰大光明殿中為太極殿後有香閣九間題曰天元閣髙深宏麗半倍于圓殿皆覆黄瓦甃以青琉璃下列文石花礎作龍尾道丹楹金飾龍繞其上四面瑣牕藻井以金繪之白石陛三重中設七寶雲龍神牌位以祀上帝相傳明世宗與陶真人講内丹于此按世宗實録四十年十二月命左都督朱希忠入直西苑親率官校環衛大𤣥都四面及西安門則此地即大𤣥都也今仍設内監道士守之晨夕鐘鼓無間但閒逰者皆得登殿陛瞻憩矣順治十八年辛丑正月世祖章皇帝升遐顧命大臣素尼鼇拜遏必隆蘇克薩哈同心輔政四臣者共來焚香盟心于此各衙門亦次第設誓余賜第在其左側時于秋雨初霽碧天如洗披襟露坐覺巍巍瓊構與明月流光相照灼恍置身于廣寒宮闕故余移居詩有門前金碧瞻天闕之句園山在瀛臺之西由大光明殿南行叠石為山穴山為洞東西分徑紆折至頂殿曰清虚俯瞰都城厯厯可見砌下暗設銅甕灌水注池池前玉盆内作盤龍昻首而起激水從盆底一竅轉出龍吻分入小洞復由殿側九曲注池中喬松數株參立古藤縈繞懸羅下垂池邊多立竒石一名小山子又曰小蓬萊其前為曲流觀甃石引水作九曲流觴皆雕琢竒異布置神巧明嘉靖時復葺鑒戒亭取殷鑒之義又南為瑤景翠林二亭古木延翳竒石錯立架石梁通東西兩池南北二梁之間曰旋磨臺螺盤而上其巔有甃皆陶埏雲龍之象相傳世宗禮斗於此臺下周以深塹梁上玉石欄柱御道鑿團龍至今堅完如故老監云明時重九或幸萬嵗山或幸兒山清虚殿登髙宮眷内臣皆著重陽景菊花補服喫迎霜菊花酒李文達賜逰西苑記云小山子逺望鬱然日光横照紫翠重叠至則有殿倚山山下有洞洞上石巖横列宻孔泉出迸流而下曰水簾其淙散激射飛薄濺灑最為可玩水聲泠泠然潛入石池龍昻其首口中噴出復潛繞殿前左右危石折旋為徑山畔有殿翼然至其頂一室正中四面簾櫳欄檻之外竒峰回互茂樹環擁異花瑤草莫可名狀下轉山前一殿深靜髙爽殿前石橋隠若虹起極其精巧韓右都御史賜逰西苑記云又西南至小山子名賽蓬萊入其門有殿殿前一大池中通石橋東西二小閣立水中橋南有娑羅樹人所罕見殿之後復有三殿其階益上益高至絶頂則與萬嵗山坤艮相望絶頂下至第三殿之前蓄水作機瞰其下有水簾洞洞之中作金龍决其水下而觀之連珠掩洞形稱其名龍口中亦噴水水皆從前殿基下隂渠之内過而至于其殿之前鑿石為曲渠復作龍頭于其西水至出龍口旋繞而東可以流觴者李長史黙逰西内記云北行古松間隠隠見岡阜鬱然至則小軒峙其前甃石為九曲黄河軒北石假山也石多削為形肖剥泐不可識山數叠上松皆偃蹇如天成絶頂列銅池者六皆貯水池旁多穿孔竇下注洞口洞中為龍勢若噴吐前為圜池龍盤其間駕幸則瀉銅池從孔竇迸落名曰水晶簾吞以洞龍洑流地中激而上出池龍口復入地注于黄河制特幻巧今山前亭觀盡廢池亦就湮僅餘一亭及清虚殿與長松古槐搖落春風暑雨中栢木殿在萬夀宮之南全以栢木為之今圮親蠶殿在萬夀宫西南有齋宮具服殿蠶室繭館皆如古制蠶壇方可二丈六尺叠二級髙二尺六寸陛四出東西北俱樹以桑柘採桑臺髙一尺四寸廣一丈四尺又有鑾駕庫五間墻圍方八十餘丈按明世宗實録禮部上言皇后出郊親蠶不便是日召大學士張孚敬令與尚書李時議移之西苑晡時駕幸西苑召二臣至太液池使中官操舟渡之入見于舊仁夀宮上曰朕惟農桑重務欲于宮前建土榖壇宮後為蠶壇以時省觀卿等視其可否二臣趨出視地駕轉昭和殿期二臣于此昭和殿今之瀛臺也土榖壇在陽德門外西南數十步明嘉靖年間給事中王璣言西苑地寛可耕宜令農夫墾藝春秋二時臨幸觀省然後收其所入輸之神倉既悉小民艱苦之狀且得自致潔清于神明其為耕藉之實孰大于是部覆可之遂建壇于此今廢惜薪司在西安門街南巷内凡宮中所用紅籮炭皆易州山中硬木燒成運至紅籮厰按尺寸鋸截編小圓荆筐用紅土刷筐而盛故曰紅籮炭每根長尺許圓徑二三寸不一又用炭末塑造將軍或仙童鍾馗各成對髙三尺金装綵畫如門神黒面黒手以存炭制名曰綵粧于十二月二十四日安于宮殿各門兩旁亦嵗暮植将軍炭之遺意次年二月初二日仍歸本司後漸作傀儡以紬絹紵綾為粧飾作為無益之費我朝悉除之惟内廷柴炭于此關支荆筐亦不刷紅土洗白厰造兜羅絨及各色五毒等縧兠羅絨織法傳自西域無敢私造者西酒房西花房牲口房舊虎城皆在櫺星門西北今盡廢南花園在西苑門迤南東向明時曰灰池種植瓜蔬于炕洞内烘養新菜以備春盤薦生之用立春日進鮮蘿葡名曰咬春本朝改為南花園雜植花樹凡江寧蘇松杭州織造所進盆景皆付澆灌培植又于煖室烘出芍藥牡丹諸花每嵗元夕賜宴之時安放乾清宮陳列筵前以為勝于剪綵秋時收養蟋蟀至燈夜則置之鼇山燈内奏樂既罷忽聞蛩聲自鼇山中出每嵗正月進梅花山茶探春貼梗海棠水仙花二月進瑞香玉蘭碧桃鸞枝三月進繡毬花杜鵑木筆木瓜海棠丁香棃花挿瓶牡丹四月進梔子花石榴花薔薇挿瓶芍藥五月進菖蒲艾葉茉莉黄楊樹盆景六七月進苿莉建蘭及鳳仙花五色斑斕置玻瓈盤中八月進巖桂九月進各種菊花十月進小盆景松竹冬青虎鬚草金絲荷葉及橘樹金橙十一月十二月進早梅探春迎春蠟瓣梅又有香片梅古幹槎牙開紅白二色安放懋勤殿余曾有詩紀之石榴紅白二種花單瓣結實如盂子大味甘曰軟子石榴棗有弱枝宻雲瓔珞諸種甚甘脆食則漿流于齒每嵗八月初收棗入錫缾封口懸井中寒冬取出進用如初從樹摘者葡萄有馬乳六月鮮紫瓊瑤王瓜有髙麗種狀如香櫞色正黄扁豆有白花蜜豆霜後更美上從清涼山手移金蓮花亦付南花園栽種四月末花開碧葉黄英鮮潔可愛其餘雜花竒樹不可名言惟設内監司灌溉之事冬月進花皆用黄布作綿套包裹不使見風菊花以緑竹作架各懸小牌書某種如粉西施水晶盤太史黄紫羅闌之𩔖按時舁送各宫殿安放花殘則隨時易以新者南書房亦如之懋勤殿古幹梅花發紅白二色應制上林春色暗相催一樹新開殿裏梅素艷欲欺瓊圃雪紅芳疑泛紫霞杯欣逢暖律吹嘘早漸識東風次第來古幹獨當霜霰候豈同凡卉㸃莓苔西十庫在西安門内向南舊設掌庫太監一員貼庫數員僉書數十員十庫自戊字後不全用十干以為巳者巳也故改用别名魏忠賢本從甲字庫出身待十庫之人獨厚本朝三十餘年十庫封錮不開塵土堆積庫後古木叢茂居人鮮少衆鳥翔集作巢以數萬計上常逰幸至此命内務府清察立檔案焉甲字庫職掌銀硃烏梅靛花黄丹緑􅈨紫草明􅈨光粉黒鉛水膠槐花藍靛五倍子闊白三梭布苧布紅花水銀硼砂螣黄茜草薑黄蜜陀僧磠砂白芨梔子百藥煎之類皆浙江等省嵗供納以備御用者乙字庫職掌奏本紙欒榜紙中夾等紙各省解到胖襖備各項奏准領取丙字庫每嵗浙江辦納本色絲綿合羅絲串五絲荒絲以備各項奏付山東河南順天等府嵗納綿花絨則内官之冬衣軍士之布花咸取備于此丁字庫每嵗浙江等處辦納生漆桐油紅黄熟銅白麻􅐨麻黄蠟錫牛筋黄牛皮麂皮鐵線魚膠白圓藤生熟建鐵等件以備御用監内官監支給戊字庫職掌河南等處解到盔甲弓箭刀及廢鐵承運庫職掌浙江四川湖廣等省黄白生絹以備欽賞外藩并内官冬衣樂舞生淨衣等用廣盈庫職掌黄紅等色平羅熟絹各色杭紗青細綿布廣惠庫職掌綵織手帕梳櫳抿刷錢貫鈔錠之𩔖廣積庫職掌燄硝熟硫黄聽盔甲厰等處成造火藥贓罰庫職掌沒官衣物等件金鼇退食筆記巻下
