body:
  text: 金鼇退食筆記地理𩔖七古蹟之屬提要臣等謹案金鼇退食筆記二巻國朝髙士竒撰士竒有春秋地名考略己著録是編乃其康熙甲子官侍講學士入侍内廷時所作前有自序稱自丁已賜居太液池之西朝夕策馬過金鼇玉蝀橋望苑中景物七閱寒暑退食之頃偶訪曩時舊制約略得之傳聞又仿彿尋其故址離宫别館廢者多矣脱復十數老監己盡遺跡漸湮無以昭我皇上卑宫室約園囿之儉徳因率筆記之詳於西而略於東以所居在苑西故也紀其興廢而復雜以時事欲見昭代之盛存為太平嘉話也又稱衙署監局載在㑹典者不書訪問未確者不書外人所罕窺者亦不敢書盖其時距明末僅四十年前朝宦豎存者猶多士竒出入禁廷得以訽訪又久寓其旁朝夕考校故所記徃徃可據朱􅉓尊日下舊聞多採掇之今奉詔考定彛尊之書徴據詳明纎悉必備此編己在包括之中顧其草創記錄之功亦不可没故仍録存之以備參稽焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9b7453cf14457f5654f83dc8cf8bc2359af6a44c1a6d059d2ce923f4b872e57e
